services:
  db:
    image: postgres:latest
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=new_rails_template_development
    ports:
      - 5432:5432
    volumes:
      - ./data:/var/lib
